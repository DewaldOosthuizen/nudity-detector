name: Dependency Audit
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
